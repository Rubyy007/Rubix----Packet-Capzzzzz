# RUBIX Windows Configuration — overrides common config

mode: "Block"
capture_interface: "auto"      # auto = scoring system picks best physical adapter
promiscuous: true
buffer_size_mb: 64
timeout_ms: 10
snaplen: 65535
bpf_filter: ~                  # null — auto-built from block list at startup

fast_path:
  enable_sampling: false
  sampling_rate_high: 0.3
  enable_aggregation: false
  aggregation_window_ms: 1000

blocking:
  enabled: true
  block_timeout_seconds: 3600
  default_action: "drop"
  auto_cleanup: true
  # iptables_chain not applicable on Windows — WFP handles enforcement

logging:
  level: "info"
  file_path: "C:\\ProgramData\\rubix\\rubix.log"
  json_format: true
  max_file_size_mb: 100
  rotation_count: 5