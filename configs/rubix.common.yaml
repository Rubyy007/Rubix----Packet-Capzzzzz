# RUBIX Common Configuration — shared across all platforms
# Platform-specific files (rubix.linux.yaml, rubix.windows.yaml) override these values

mode: "Block"
capture_interface: "auto"
promiscuous: true
buffer_size_mb: 64
timeout_ms: 10
snaplen: 65535
bpf_filter: ~                  # null — auto-built from block list at startup

fast_path:
  enable_sampling: false
  sampling_rate_high: 0.3
  enable_aggregation: false
  aggregation_window_ms: 1000

blocking:
  enabled: true
  block_timeout_seconds: 3600
  default_action: "drop"
  auto_cleanup: true

logging:
  level: "info"
  json_format: true
  max_file_size_mb: 100
  rotation_count: 5